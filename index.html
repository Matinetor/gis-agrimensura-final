  <style>
    /* 1. CONTENEDOR PRINCIPAL - FIX DE ALTURA */
    #sidebar-right.leaflet-sidebar {
        position: absolute !important;
        right: 0 !important;
        left: auto !important;
        top: 60px !important; 
        bottom: 10px !important;
        
        /* ESTA ES LA CLAVE: Le damos una altura fija calculada */
        height: calc(100% - 70px) !important; 
        max-height: calc(100% - 70px) !important;
        
        z-index: 3000 !important;
        transition: width 0.4s ease;
        border: none; 
        box-shadow: 0 1px 5px rgba(0,0,0,0.65);
    }

    /* 2. ESTADO ABIERTO */
    #sidebar-right.leaflet-sidebar:not(.collapsed) {
        width: 400px !important;
        max-width: 85vw;
        box-shadow: -5px 0 15px rgba(0,0,0,0.1) !important;
    }

    /* 3. ESTADO CERRADO (Invisible) */
    #sidebar-right.leaflet-sidebar.collapsed {
        width: 0 !important;
        padding: 0 !important;
    }

    /* 4. OCULTAR PESTAÑAS NATIVAS */
    #sidebar-right .leaflet-sidebar-tabs { display: none !important; }

    /* 5. CONTENIDO INTERNO (El Fix del corte) */
    #sidebar-right .leaflet-sidebar-content {
        width: 100% !important;
        background: #fff;
        padding: 0 !important; /* El padding lo maneja la ficha interna */
        overflow-x: hidden !important; /* Evita scroll horizontal */
    }

    /* 6. ESTILOS DE LA FICHA + BOTÓN CERRAR */
    .ficha-obra {
        padding: 20px;
        box-sizing: border-box; /* CLAVE: Evita que el padding corte el contenido */
        width: 100%;
        position: relative;
    }
    
    /* EL BOTÓN DE CERRAR (X) */
    .btn-cerrar-ficha {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 24px;
        font-weight: bold;
        color: #888;
        cursor: pointer;
        z-index: 10;
        background: white;
        width: 30px; height: 30px;
        text-align: center;
        line-height: 30px;
        border-radius: 50%;
    }
    .btn-cerrar-ficha:hover { color: #d9534f; background: #eee; }

    /* FOTOS Y TEXTOS */
    .ficha-foto-container {
    width: 100%;
    height: 180px;
    background: #f8f9fa;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #ddd;
    margin-bottom: 10px;
    }
    .ficha-foto {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Esto evita que la foto se deforme */
    transition: transform 0.3s;
    }
    .ficha-foto:hover {
        transform: scale(1.05);
    }
    /* Fix para que los botones de Bootstrap no se salgan */
    .btn-block { width: 100%; display: block; box-sizing: border-box; }

    /* Contenedor General */
    .ficha-tecnica-container {
        font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        color: #444;
    }

    /* Títulos y Etiquetas */
    .sidebar-title {
        font-size: 20px;
        margin-bottom: 5px;
        line-height: 1.2;
    }

    .id-tag {
        background: #e9ecef;
        color: #495057;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
    }

    /* Botones de Contacto Estilizados */
    .btn-contact {
        border-radius: 50px; /* Redondeados */
        font-weight: 600;
        font-size: 13px;
        padding: 8px 12px;
        transition: all 0.3s ease;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-contact i {
        margin-right: 8px;
        font-size: 16px;
    }

    .btn-whatsapp { background-color: #25D366; color: white; }
    .btn-whatsapp:hover { background-color: #128C7E; color: white; transform: translateY(-1px); }

    .btn-email { background-color: #0078A8; color: white; }
    .btn-email:hover { background-color: #005a7d; color: white; transform: translateY(-1px); }

    /* Estilos para Acordeón y Carrusel */
    .panel-group .panel {
        border-radius: 4px;
        margin-bottom: 5px;
        border: 1px solid #ddd;
    }
    .panel-heading {
        padding: 10px 15px;
        background-color: #f8f9fa;
        cursor: pointer;
    }
    .panel-title a {
        display: block; /* Hace que toda la barra sea clickeable */
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        color: #444;
    }
    .panel-title i {
        margin-right: 8px;
        width: 20px;
        text-align: center;
    }
    /* Flechitas del carrusel más visibles */
    .carousel-control.left, .carousel-control.right {
        background-image: none; /* Quita el degradado feo por defecto */
    }
    .carousel-control span {
        color: #0078A8;
        text-shadow: 1px 1px 2px white;
    }
</style>

  <script>
    $(document).ready(function() {
      // Escuchamos el evento personalizado que Argenmap debería disparar o verificamos el estado
      var checkMap = setInterval(function() {
        // Verificamos que 'mapa' exista y sea una instancia real de Leaflet (L.Map)
        if (window.mapa instanceof L.Map) {
          clearInterval(checkMap);
          console.log("🚀 Mapa detectado como instancia de Leaflet.");
          
          // Ejecutamos la carga de obras
          if (typeof cargarCapaObras === 'function') {
            cargarCapaObras(window.mapa);
          }
        }
      }, 500); // Aumentamos a 500ms para dar tiempo a app.js y map.js
    });

    // Fix definitivo de rutas de iconos
    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({
      iconRetinaUrl: 'dist/vendor/css/images/marker-icon-2x.png',
      iconUrl: 'dist/vendor/css/images/marker-icon.png',
      shadowUrl: 'dist/vendor/css/images/marker-shadow.png',
    });
  </script>
